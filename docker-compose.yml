# TechMove GLMS — Full Docker Compose Orchestration
# Spins up 3 containers: SQL Server, Web API, MVC Frontend
# All containers communicate via the internal "techmove-net" network.

version: "3.9"

services:

  # ────────────────────────────────────────────────────────────────────────────
  # Container 1: SQL Server Database
  # ────────────────────────────────────────────────────────────────────────────
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "TechMove@2025!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - techmove-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TechMove@2025!' -Q 'SELECT 1' -No -C || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ────────────────────────────────────────────────────────────────────────────
  # Container 2: Web API Backend
  # Depends on SQL Server. Runs EF migrations + seed on startup.
  # ────────────────────────────────────────────────────────────────────────────
  glms-backend-api:
    build:
      context: .
      dockerfile: TechMove.API/Dockerfile
    container_name: glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Server=sql-server-db,1433;
        Database=TechMoveDB;
        User Id=sa;
        Password=TechMove@2025!;
        TrustServerCertificate=True;
      Jwt__Key: "TechMoveSecretKey_ThisMustBeAtLeast32Characters!"
      Jwt__Issuer: "TechMoveAPI"
      Jwt__Audience: "TechMoveClient"
    ports:
      - "5180:8080"
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - techmove-net
    restart: on-failure

  # ────────────────────────────────────────────────────────────────────────────
  # Container 3: MVC Frontend
  # Talks to the API container by its service name "glms-backend-api".
  # ────────────────────────────────────────────────────────────────────────────
  glms-frontend-web:
    build:
      context: .
      dockerfile: TechMove/Dockerfile
    container_name: glms-frontend-web
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ApiSettings__BaseUrl: "http://glms-backend-api:8080/"
      ApiSettings__Username: "admin"
      ApiSettings__Password: "admin123"
    ports:
      - "5000:8080"
    depends_on:
      - glms-backend-api
    networks:
      - techmove-net
    restart: on-failure

# ────────────────────────────────────────────────────────────────────────────
# Named volumes
# ────────────────────────────────────────────────────────────────────────────
volumes:
  sqldata:

# ────────────────────────────────────────────────────────────────────────────
# Internal Docker network — containers resolve each other by service name
# ────────────────────────────────────────────────────────────────────────────
networks:
  techmove-net:
    driver: bridge
